name: pr-check

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Domain
        run: dotnet build src/RevitPlugin.Domain/RevitPlugin.Domain.csproj -c Release

      - name: Build + run tests
        run: dotnet test src/RevitPlugin.Tests/RevitPlugin.Tests.csproj -c Release --logger "console;verbosity=normal"
